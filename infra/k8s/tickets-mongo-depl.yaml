apiVersion: apps/v1
kind: Deployment
metadata:
  name: tickets-mongo-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tickets-mongo
  template:
    metadata:
      labels:
        app: tickets-mongo
    spec:
      containers:
        - name: tickets-mongo
          image: mongo
          args: ["--replSet", "rs0", "--bind_ip_all"]
          env:
            - name: GLIBC_TUNABLES
              value: "glibc.pthread.rseq=1"
          startupProbe:
            tcpSocket:
              port: 27017
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 5

          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  mongosh --quiet --eval "try { const h = db.adminCommand({ hello: 1 }); quit(h.isWritablePrimary ? 0 : 1); } catch (e) { quit(1); }"
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: tickets-mongo-srv
spec:
  publishNotReadyAddresses: true
  selector:
    app: tickets-mongo
  ports:
    - protocol: TCP
      name: tickets-db
      port: 27017
      targetPort: 27017
---
apiVersion: batch/v1
kind: Job
metadata:
  name: tickets-mongo-rs-init
spec:
  backoffLimit: 20
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: tickets-mongo-rs-init
          image: mongo
          command:
            - sh
            - -c
            - |
              until mongosh --host tickets-mongo-srv --quiet --eval "db.adminCommand({ ping: 1 })" > /dev/null 2>&1; do
                echo "Waiting for tickets-mongo to accept connections..."
                sleep 2
              done

              mongosh --host tickets-mongo-srv --quiet --eval "
                try {
                  rs.status();
                  print('Replica set already initiated');
                } catch (e) {
                  print('Initiating replica set...');
                  rs.initiate({
                    _id: 'rs0',
                    members: [
                      {
                        _id: 0,
                        host: 'tickets-mongo-srv:27017'
                      }
                    ]
                  });
                }
              "

              until mongosh --host tickets-mongo-srv --quiet --eval "try { const h = db.adminCommand({ hello: 1 }); quit(h.isWritablePrimary ? 0 : 1); } catch (e) { quit(1); }" > /dev/null 2>&1; do
                echo "Waiting for tickets-mongo replica set PRIMARY..."
                sleep 2
              done

              echo "tickets-mongo replica set is PRIMARY"
