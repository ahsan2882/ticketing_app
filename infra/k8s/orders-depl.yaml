apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      initContainers:
        - name: wait-for-nats
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nats-srv 4222; do
                echo "Waiting for nats..."
                sleep 2
              done
        - name: wait-for-orders-mongo-primary
          image: mongo
          command:
            - sh
            - -c
            - |
              until mongosh --host orders-mongo-srv --quiet --eval "try { const h = db.adminCommand({ hello: 1 }); quit(h.isWritablePrimary ? 0 : 1); } catch (e) { quit(1); }" > /dev/null 2>&1; do
                echo "Waiting for orders-mongo PRIMARY..."
                sleep 2
              done
              echo "orders-mongo is PRIMARY"
      containers:
        - name: orders
          image: ahsan2882/orders
          env:
            - name: NATS_URL
              value: "nats://nats-srv:4222"
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_KEY
            - name: NODE_ENV
              value: "development"
            - name: ORDERS_MONGO_URI
              value: "mongodb://orders-mongo-srv:27017/orders?replicaSet=rs0"
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: orders-srv
spec:
  selector:
    app: orders
  ports:
    - protocol: TCP
      name: orders-port
      port: 3000
      targetPort: 3000
