apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      initContainers:
        - name: wait-for-nats
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z nats-srv 4222; do
                echo "Waiting for nats..."
                sleep 2
              done
        - name: wait-for-orders-mongo
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z orders-mongo-srv 27017; do
                echo "Waiting for orders-mongo..."
                sleep 2
              done
      containers:
        - name: orders
          image: ahsan2882/orders
          env:
            - name: NATS_URL
              value: "nats://nats-srv:4222"
            - name: JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_KEY
            - name: NODE_ENV
              value: "development"
            - name: ORDERS_MONGO_URI
              value: "mongodb://orders-mongo-srv:27017/orders"
          startupProbe:
            httpGet:
              path: /healthz
              port: 3000
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: orders-srv
spec:
  selector:
    app: orders
  ports:
    - protocol: TCP
      name: orders-port
      port: 3000
      targetPort: 3000
